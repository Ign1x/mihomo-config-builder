mixed-port: 7890
mode: rule
log-level: info
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - +.lan
proxies:
  - name: BASE-LOCAL
    type: ss
    server: base.example.com
    port: 443
    cipher: aes-128-gcm
    password: pass
proxy-groups:
  - name: BASE
    type: select
    proxies:
      - BASE-LOCAL
      - DIRECT
rules:
  - MATCH,BASE
